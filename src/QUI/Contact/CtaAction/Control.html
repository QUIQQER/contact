<aside data-name="left" class="quiqqer-contact-ctaAction__leftContent">
    {if $logo}
    <div class="logo" aria-hidden="true">
        {image image=$logo height=50 class="logo-img"}
    </div>
    {/if}

    <div class="default-content">
        {$content}
    </div>

    {if $hasButtons}
        <div data-name="buttons" class="btn-container quiqqer-contact-ctaAction-buttons quiqqer-contact-ctaAction-buttons--{$btnStyle}">
            {foreach from=$buttons item=button}
                {$button->create()}
            {/foreach}
        </div>
    {/if}
</aside>

<section data-name="right" class="quiqqer-contact-ctaAction__rightContent">
    {if $title}
        <h3>{$title}</h3>
    {/if}

    {if $description}
        <p class="sub">{$description}</p>
    {/if}

    <form action="#" method="post" class="quiqqer-contact-ctaAction__form form form--{$formDesign}">

        <div class="form-field form-field--name">
            <label class="form-label" for="name">
                {$nameLabel}
            </label>
            <div class="form-control">
                <input type="text"
                       name="name"
                       id="name"
                       placeholder="{$namePlaceholder}"
                       autocomplete="name"
                       required
                />
            </div>
        </div>
        <div class="form-field form-field--company">
            <label class="form-label" for="company">
                {$companyLabel}
            </label>
            <div class="form-control">
                <input type="text"
                       name="company"
                       id="company"
                       placeholder="{$companyPlaceholder}"
                       autocomplete="name"
                />
            </div>
        </div>

        <div class="form-field form-field--email">
            <label class="form-label" for="email">
                {$emailLabel}
            </label>
            <div class="form-control">
                <input type="email"
                       name="email"
                       id="email"
                       placeholder="{$emailPlaceholder}"
                       autocomplete="name"
                       required
                />
            </div>
        </div>

        <div class="form-field form-field--phone">
            <label class="form-label" for="phone">
                {$phoneLabel}
            </label>
            <div class="form-control">
                <input type="tel"
                       name="phone"
                       id="phone"
                       placeholder="{$phonePlaceholder}"
                       autocomplete="tel"
                />
            </div>
        </div>

        <div class="form-field form-field--message">
            <label class="form-label" for="message">
                {$messageLabel}
            </label>
            <div class="form-control">
                <textarea name="message" id="message" placeholder="{$messagePlaceholder}" required class="quiqqer-contact-ctaAction__textarea"></textarea>
            </div>
        </div>

        <div class="form-field form-field--privacy">
            <label data-name="privacy" class="check">
                <input type="checkbox" name="privacy" id="privacy" required/>
                <span>{$privacyText}</span>
            </label>
        </div>

        <div class="form-actions">
            <button class="btn btn-primary" type="submit">
                {$submitLabel}
            </button>
        </div>

    </form>
</section>
